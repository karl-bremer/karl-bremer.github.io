<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A3C2E; width: 520px; height: 420px; font-family: Calibri, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="480" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const pad = { top: 40, right: 20, bottom: 55, left: 65 };
const cw = W - pad.left - pad.right;
const ch = H - pad.top - pad.bottom;

// map Low=1 Med=2 High=3 to 0..1
function px(v) { return pad.left + (v - 0.5) / 3 * cw; }
function py(v) { return pad.top + (1 - (v - 0.5) / 3) * ch; }

// background zones
const zoneGrad = ctx.createLinearGradient(pad.left, 0, pad.left + cw, 0);
zoneGrad.addColorStop(0,   'rgba(30,68,54,0.7)');
zoneGrad.addColorStop(0.5, 'rgba(46,74,32,0.6)');
zoneGrad.addColorStop(1,   'rgba(80,30,30,0.4)');
ctx.fillStyle = zoneGrad;
ctx.fillRect(pad.left, pad.top, cw, ch);

// grid lines
ctx.strokeStyle = 'rgba(255,255,255,0.08)';
ctx.lineWidth = 1;
[1,2,3].forEach(v => {
  // vertical
  ctx.beginPath(); ctx.moveTo(px(v), pad.top); ctx.lineTo(px(v), pad.top+ch); ctx.stroke();
  // horizontal
  ctx.beginPath(); ctx.moveTo(pad.left, py(v)); ctx.lineTo(pad.left+cw, py(v)); ctx.stroke();
});

// risks: [label, likelihood(1-3), impact(1-3), color]
const risks = [
  ["Supply chain delay",   1.85, 3.1,  '#F2C94E'],
  ["Energy price spike",   1.0,  2.0,  '#6FCF97'],
  ["Regulatory change",    1.0,  3.0,  '#6FCF97'],
  ["Construction overrun", 2.15, 2.9,  '#F2C94E'],
];

// label offsets [dx, dy, anchor]
const offsets = [
  [-10, -18, 'right'],
  [ 14,   6, 'left' ],
  [ 14, -16, 'left' ],
  [ 10,  12, 'left' ],
];

risks.forEach(([label, lh, im, col], i) => {
  const x = px(lh), y = py(im);
  // shadow
  ctx.beginPath(); ctx.arc(x, y, 14, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
  // dot
  ctx.beginPath(); ctx.arc(x, y, 12, 0, 2*Math.PI);
  ctx.fillStyle = col; ctx.fill();
  ctx.strokeStyle = '#1A3C2E'; ctx.lineWidth = 2; ctx.stroke();
  // label
  const [dx, dy, anchor] = offsets[i];
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '12px Calibri, sans-serif';
  ctx.textAlign = anchor;
  ctx.fillText(label, x + dx, y + dy);
});

// axes labels
const axLabels = ['Low', 'Medium', 'High'];
ctx.fillStyle = '#CCCCCC'; ctx.font = '13px Calibri, sans-serif';
// x axis
ctx.textAlign = 'center';
[1,2,3].forEach((v,i) => ctx.fillText(axLabels[i], px(v), pad.top + ch + 22));
// y axis
ctx.textAlign = 'right';
[1,2,3].forEach((v,i) => ctx.fillText(axLabels[i], pad.left - 10, py(v) + 5));

// axis titles
ctx.fillStyle = '#CCCCCC'; ctx.font = '13px Calibri, sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Likelihood', pad.left + cw/2, H - 4);
ctx.save(); ctx.translate(14, pad.top + ch/2); ctx.rotate(-Math.PI/2);
ctx.fillText('Impact', 0, 0); ctx.restore();

// title
ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 16px Calibri, sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Risk Matrix', pad.left + cw/2, 24);
</script>
</body>
</html>
