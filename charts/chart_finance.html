<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A3C2E; width: 680px; height: 460px; font-family: Calibri, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="640" height="420"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const items = [
  { label: 'PM & Compliance',    val: 4,  color: '#2E7D5A' },
  { label: 'Cooling',            val: 6,  color: '#2E7D5A' },
  { label: 'IT Hardware',        val: 10, color: '#6FCF97' },
  { label: 'Renewable Energy',   val: 12, color: '#F2C94E' },
  { label: 'Civil Works',        val: 18, color: '#6FCF97' },
];

const pad = { top: 20, right: 110, bottom: 20, left: 175 };
const cw = W - pad.left - pad.right;
const ch = H - pad.top - pad.bottom;
const barH = 46;
const gap = (ch - items.length * barH) / (items.length + 1);
const maxVal = 20;

items.forEach((item, i) => {
  const y = pad.top + gap + i * (barH + gap);
  const barW = (item.val / maxVal) * cw;

  // bar
  ctx.fillStyle = item.color;
  ctx.beginPath();
  ctx.roundRect(pad.left, y, barW, barH, [0, 6, 6, 0]);
  ctx.fill();

  // category label left
  ctx.fillStyle = '#CCCCCC';
  ctx.font = '15px Calibri, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(item.label, pad.left - 12, y + barH / 2);

  // value right
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px Calibri, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('€' + item.val + 'M', pad.left + barW + 10, y + barH / 2);
});

// title
ctx.fillStyle = '#6FCF97';
ctx.font = 'bold 14px Calibri, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'top';
ctx.fillText('Budget Breakdown — €50M Total', W / 2, 4);
</script>
</body>
</html>
